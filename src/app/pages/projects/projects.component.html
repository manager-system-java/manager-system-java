<div class="container">
  <h2>Gerenciar Projetos</h2>

  <div class="form">
    <h3>Criar novo projeto</h3>
    <input [(ngModel)]="projectName" placeholder="Nome do projeto" />
    <input [(ngModel)]="projectDescription" placeholder="Descrição" />
    <button (click)="createProject()">Criar</button>
  </div>

  <div class="list">
    <h3>Projetos criados</h3>
    <div *ngFor="let project of projects" class="project-card">
      <h4>{{ project.name }}</h4>
      <p>{{ project.description }}</p>
      <span>Status: {{ project.status }}</span>
      <div *ngIf="project.members.length > 0">
        <p>Membros: {{ project.members.join(', ') }}</p>
      </div>
      <p *ngIf="project.members.length === 0">Nenhum membro ainda.</p>
    </div>
    <p *ngIf="projects.length === 0">Nenhum projeto criado ainda.</p>
  </div>
</div>
