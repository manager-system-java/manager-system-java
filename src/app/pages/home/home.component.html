<div class="container">
  <h2>Bem-vindo, {{ username }}!</h2>

  <div class="list">
    <h3>Projetos disponíveis</h3>
    <div *ngFor="let project of projects" class="project-card">
      <h4>{{ project.name }}</h4>
      <p>{{ project.description }}</p>
      <span>Status: {{ project.status }}</span>
      <div *ngIf="project.members.length > 0">
        <p>Membros: {{ project.members.join(', ') }}</p>
      </div>
      <button (click)="joinProject(project.id)">Participar</button>
    </div>
    <p *ngIf="projects.length === 0">Nenhum projeto disponível.</p>
  </div>
</div>
